<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-primary">
        <a class="navbar-brand" href="#">MEDICAL SITE</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">HOME</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'contact_us' %}">CONTACT US</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'medicine_list' %}">MEDICINES</a></li>
        
                </ul>
                <ul class="navbar-nav ms-auto">
                {% if request.user.is_authenticated  %}
                <li class="nav-item">
                <span class="navbar-text me-2 text-white" >{{ request.user.username }}</span>
                </li>
                <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">LOGOUT</a></li>
                {% else %}
                <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">LOGIN</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'signup' %}">SIGN UP</a></li>
                {% endif %}
                
            </ul>
        </div>
    </nav>
   

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>


</body>
</html>
