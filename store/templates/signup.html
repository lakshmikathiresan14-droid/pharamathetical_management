{% extends 'base.html' %}
{% block title %}mysignup - Medicine Management{% endblock %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,  initial-scale=1,shrink-to-fit=no" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" />
    <title>SIGNUP FORM</title>
</head>
<body>
    <h1 class="text-primary text-center">SIGNUP </h1>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <form id="registrationForm" method="post" action="{% url 'signup' %}">
                            {{form.errors}}
                            {% csrf_token %}
                             <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" class="form-control" name="username" id="email" placeholder="Email" />
                            </div>
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" class="form-control" name="password1" id="password" placeholder="Password" />
                            </div>
                            <div class="form-group">
                                <label for="confirm password"> confirm Password</label>
                                <input type="password" class="form-control" name="password2" id="confirm_password" placeholder="Password"/>
                            </div>
                            <button class="btn btn-danger">Signup</button>
                        </form>
                        <p class="mt-3">Already have an account?<a href="{% url 'login'%}">login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

{% endblock %}
